_min_copier_version: "9.0.0"

project_name:
  type: str
  help: "Project name (e.g. my-cool-lib)"

package_name:
  type: str
  help: "Python package name (e.g. my_cool_lib)"
  default: "{{ project_name | replace('-', '_') | lower }}"

description:
  type: str
  help: "One-line project description"
  default: ""

author:
  type: str
  help: "Author name"
  default: "Dr Alister S. Goodfellow"

github_user:
  type: str
  help: "GitHub username or org"
  default: "aligfellow"

year:
  type: str
  help: "Copyright year"
  default: "2026"

python_version:
  type: str
  help: "Minimum Python version"
  default: "3.10"

ci_python_version:
  type: str
  help: "Python version for CI"
  default: "3.14"

include_cli:
  type: bool
  help: "Include a CLI entry point?"
  default: true

include_citation:
  type: bool
  help: "Include a CITATION.cff?"
  default: true

check_magic_numbers:
  type: bool
  help: "Enforce no magic numbers (PLR2004)? Disable for legacy codebases."
  default: true

_subdirectory: project

_tasks:
  - command: "git init"
    when: "{{ _copier_operation == 'copy' }}"
  - command: "git add ."
    when: "{{ _copier_operation == 'copy' }}"
  - command: "git commit -m 'Initial commit from copier template'"
    when: "{{ _copier_operation == 'copy' }}"
